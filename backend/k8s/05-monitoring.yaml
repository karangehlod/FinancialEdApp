---
# ServiceMonitor for Prometheus (if using Prometheus Operator)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-monitor
  namespace: financialedapp
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: backend
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s

---
# PrometheusRule for alerts
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: backend-alerts
  namespace: financialedapp
  labels:
    prometheus: kube-prometheus
spec:
  groups:
  - name: backend.rules
    interval: 30s
    rules:
    # High error rate alert
    - alert: HighErrorRate
      expr: |
        rate(http_requests_total{status=~"5.."}[5m]) > 0.05
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "High error rate detected for backend"
        description: "Backend is experiencing {{ $value | humanizePercentage }} error rate"
    
    # High latency alert
    - alert: HighLatency
      expr: |
        histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High latency detected for backend"
        description: "95th percentile latency is {{ $value | humanizeDuration }}"
    
    # Pod restart alert
    - alert: PodRestartingTooOften
      expr: |
        rate(kube_pod_container_status_restarts_total{namespace="financialedapp"}[15m]) > 0.1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Pod is restarting too often"
        description: "Pod {{ $labels.pod }} is restarting {{ $value | humanize }} times per minute"
    
    # Low disk space alert
    - alert: LowDiskSpace
      expr: |
        kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes < 0.1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Low disk space on volume"
        description: "Volume {{ $labels.persistentvolumeclaim }} has {{ $value | humanizePercentage }} space available"
    
    # Memory pressure alert
    - alert: HighMemoryUsage
      expr: |
        (container_memory_usage_bytes / container_spec_memory_limit_bytes) > 0.9
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High memory usage detected"
        description: "Container {{ $labels.container }} is using {{ $value | humanizePercentage }} of memory limit"
    
    # CPU throttling alert
    - alert: CPUThrottling
      expr: |
        rate(container_cpu_cfs_throttled_seconds_total[5m]) > 0.1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Container CPU is being throttled"
        description: "Container {{ $labels.container }} is being throttled {{ $value | humanizePercentage }} of the time"

---
# PodMonitor for application metrics
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: backend-pod-monitor
  namespace: financialedapp
  labels:
    app: backend
spec:
  selector:
    matchLabels:
      app: backend
  podMetricsEndpoints:
  - port: http
    path: /metrics
    interval: 30s

---
# Alert Manager route (for email/Slack notifications)
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-backend-route
  namespace: financialedapp
data:
  slack-notification.txt: |
    route:
      receiver: 'slack'
      routes:
      - match:
          alertname: HighErrorRate
        receiver: 'critical-slack'
    
    receivers:
    - name: 'slack'
      slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#alerts'
        title: 'FinancialEdApp Alert'
    
    - name: 'critical-slack'
      slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#critical-alerts'
        title: 'CRITICAL: FinancialEdApp'
