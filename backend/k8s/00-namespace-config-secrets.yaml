---
# Namespace for FinancialEdApp
apiVersion: v1
kind: Namespace
metadata:
  name: financialedapp
  labels:
    name: financialedapp
    environment: production

---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: financialedapp
data:
  API_V1_PREFIX: "/api/v1"
  PROJECT_NAME: "FinancialEdApp"
  PROJECT_VERSION: "1.0.0"
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  ENABLE_SWAGGER_UI: "true"
  ENABLE_REDOC: "true"
  ENABLE_OPENAPI: "true"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS_PER_MINUTE: "100"
  PROMETHEUS_ENABLED: "true"
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  CORS_ORIGINS: '["http://localhost:3000","http://localhost:8000"]'
  CORS_ALLOW_CREDENTIALS: "true"
  CORS_ALLOW_METHODS: '["*"]'
  CORS_ALLOW_HEADERS: '["*"]'

---
# Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: financialedapp
type: Opaque
stringData:
  # Database Credentials
  POSTGRES_USER: financialuser
  POSTGRES_PASSWORD: SecurePassword123!
  POSTGRES_DB: financialedapp_db
  DATABASE_URL: postgresql+asyncpg://financialuser:SecurePassword123!@postgres:5432/financialedapp_db
  
  # Redis Credentials
  REDIS_PASSWORD: RedisPassword123!
  REDIS_URL: redis://:RedisPassword123!@redis:6379/0
  
  # JWT Secret
  SECRET_KEY: your-super-secret-key-change-in-production-12345
  
  # Email Configuration (Optional)
  SMTP_SERVER: smtp.gmail.com
  SMTP_PORT: "587"
  SMTP_USERNAME: your-email@gmail.com
  SMTP_PASSWORD: your-app-password
  SENDER_EMAIL: noreply+theprodsde@gmail.com
  
  # External Services
  SENTRY_DSN: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_REGION: us-east-1

---
# StorageClass for persistent volumes
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: financialedapp-storage
provisioner: kubernetes.io/aws-ebs
parameters:
  type: gp3
  iops: "3000"
  throughput: "125"
  fstype: ext4
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
