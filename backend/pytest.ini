[pytest]
addopts = -m "not (bdd or live or live_auth or live_budgets or live_expenses or live_notifications or live_gdpr)"
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# BDD feature files location
bdd_features_base_dir = tests/features

markers =
    unit: Unit tests (no I/O, mocked dependencies)
    integration: Integration tests (real DB/Redis via SQLite in-memory)
    bdd: Behaviour-driven tests (pytest-bdd Gherkin scenarios)
    security: Security-focused tests (rate limiting, auth hardening)
    slow: Tests that take more than 1 second
    live: Live integration tests against real Postgres + Redis containers
    live_auth: Live auth tests (register, login, 2FA, /me, token refresh)
    live_budgets: Live budget CRUD + cross-user isolation tests
    live_expenses: Live expense CRUD + financial math tests
    live_notifications: Live notification delivery + read/unread tests
    live_gdpr: Live GDPR export, account deletion, right-to-be-forgotten

filterwarnings =
    ignore::RuntimeWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*Event loop is closed.*:RuntimeWarning
    ignore:.*Exception closing connection.*:RuntimeWarning
    ignore:.*Exception in callback.*:RuntimeWarning
    ignore:.*Task was destroyed but it is pending.*:RuntimeWarning
    ignore:.*asyncpg.*:RuntimeWarning
    ignore:.*coroutine.*was never awaited.*:RuntimeWarning
    ignore:.*ResourceWarning.*:ResourceWarning

