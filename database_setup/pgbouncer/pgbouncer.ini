[databases]
; Auth database
auth_db = host=postgres-auth port=5432 dbname=auth_db
           pool_size=50 max_db_connections=80
           pool_mode=transaction

; Financial data database
data_db = host=postgres-data port=5432 dbname=data_db
           pool_size=80 max_db_connections=120
           pool_mode=transaction

[pgbouncer]
;; Network
listen_addr = *
listen_port = 5432

;; Authentication — use scram-sha-256
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

;; Connection pooling
; max application connections PgBouncer will accept
max_client_conn = 5000
; Default pool size per db/user pair
default_pool_size = 50
; Reserve pool for emergency connections (when default pool is full)
reserve_pool_size = 20
reserve_pool_timeout = 3
; Minimum pool size to maintain (avoids cold-start penalty)
min_pool_size = 10

;; Transaction-mode pooling (best for stateless FastAPI apps)
pool_mode = transaction

;; Timeouts
; How long to wait for a server connection before returning error
server_connect_timeout = 15
; How long a server connection can be idle before closing
server_idle_timeout = 600
; How long a client can be idle before closing
client_idle_timeout = 300
; Timeout for waiting in queue for a server connection
query_wait_timeout = 30
; Server-side connection lifetime (recycle connections periodically)
server_lifetime = 3600

;; Query cancel support (required for proper async behaviour)
cancel_wait_timeout = 10

;; TLS (enable in production)
; server_tls_sslmode = require
; server_tls_ca_file = /etc/ssl/certs/ca-bundle.crt
; client_tls_sslmode = require
; client_tls_cert_file = /etc/ssl/pgbouncer/server.crt
; client_tls_key_file = /etc/ssl/pgbouncer/server.key

;; Admin interface
; PgBouncer admin database (connect with psql -p 5432 pgbouncer)
admin_users = pgbouncer_admin
stats_users = pgbouncer_stats

;; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

;; Server-side keepalive
server_check_delay = 30
server_check_query = SELECT 1

;; Disable prepared statements cache
; (asyncpg uses statement_cache_size=0 in transaction mode)
; max_prepared_statements = 0

;; Performance
tcp_keepalive = 1
tcp_keepidle = 10
tcp_keepintvl = 10
tcp_keepcnt = 3
