name: CI - Validate Backend and Frontend

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  COVERAGE_THRESHOLD: 80
  SECURITY_GATES_STRICT: "true"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Backend Lint + Type Check
  # ---------------------------------------------------------------------------
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: pip install ruff mypy types-bleach types-passlib types-redis sqlalchemy[mypy]

      - name: Run Ruff (linter + formatter check)
        run: ruff check app/ tests/ --output-format=github

      - name: Run Ruff format check
        run: ruff format app/ tests/ --check

      - name: Run mypy (type checking — non-blocking for now)
        run: mypy app/ --ignore-missing-imports --no-error-summary

  # ---------------------------------------------------------------------------
  # Job 2: Backend Security Scan
  # ---------------------------------------------------------------------------
  backend-security:
    name: Backend - Security Gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Run Bandit (SAST — Python)
        run: |
          bandit -r app/ \
            -x app/tests \
            -ll \
            --format json \
            --output bandit-report.json
          bandit -r app/ -x app/tests -ll

      - name: Run pip-audit (dependency CVEs)
        # Strict by design: fail CI when known vulnerable Python dependencies exist.
        run: pip-audit -r requirements.txt --format json -o audit-report.json

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ github.sha }}
          path: |
            backend/bandit-report.json
            backend/audit-report.json

      # Scan for secrets with TruffleHog
      - name: TruffleHog secret scan
        # Strict by design: verified secret findings should block merges.
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # ---------------------------------------------------------------------------
  # Job 3: Backend Tests
  # ---------------------------------------------------------------------------
  backend-tests:
    name: Backend — Tests (PostgreSQL + Redis)
    runs-on: ubuntu-latest
    needs: [backend-lint]
    defaults:
      run:
        working-directory: backend

    services:
      # Test PostgreSQL (Auth DB)
      postgres-auth:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: auth_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      # Test PostgreSQL (Data DB)
      postgres-data:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: data_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

      # Test Redis
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      # Application settings for CI
      APP_NAME: "FinancialEdApp-Test"
      APP_VERSION: "0.0.0"
      DEBUG: "false"
      ENVIRONMENT: "testing"
      ALLOWED_ORIGINS: "http://localhost:5173"
      JWT_SECRET_KEY: "ci-test-secret-key-not-for-production-minimum-32-chars"
      JWT_ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      AUTH_DB_USER: "postgres"
      AUTH_DB_PASSWORD: "testpassword"
      AUTH_DB_HOST: "localhost"
      AUTH_DB_PORT: "5432"
      AUTH_DB_NAME: "auth_test"
      DATA_DB_USER: "postgres"
      DATA_DB_PASSWORD: "testpassword"
      DATA_DB_HOST: "localhost"
      DATA_DB_PORT: "5433"
      DATA_DB_NAME: "data_test"
      REDIS_URL: "redis://localhost:6379/0"
      EMAIL_ENABLED: "false"
      TESTING: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run database migrations
        run: alembic upgrade head

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }} \
            --timeout=60 \
            -n auto

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: backend/coverage.xml

  # ---------------------------------------------------------------------------
  # Job 4: Frontend Lint + Build
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Frontend - Lint, Typecheck, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src/ --ext .js,.jsx,.ts,.tsx --max-warnings 0

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build for production
        run: npm run build
        env:
          VITE_API_URL: "https://api.example.com"

      - name: Analyze bundle size
        run: |
          du -sh dist/
          find dist/ -name "*.js" | xargs ls -la | sort -k5 -rn | head -20

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: frontend/dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 5: Docker Build (verify images build successfully)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker - Verify Image Builds
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (dry-run)
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: financialedapp-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (dry-run)
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          tags: financialedapp-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
